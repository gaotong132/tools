name: quality

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check llm_trace_analyzer agent_history_analyzer tests
      - run: python -m mypy llm_trace_analyzer
      - run: python -m pytest --cov=llm_trace_analyzer --cov-branch --cov-report=term-missing
